name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: brew audit
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Check out tap
        uses: actions/checkout@v4

      - name: Tap this repo
        run: brew tap link-coder100788/whatdidido $(pwd)

      - name: Audit formula
        run: brew audit --strict link-coder100788/whatdidido/whatdidido

