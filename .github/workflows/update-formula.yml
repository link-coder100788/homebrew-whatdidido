name: Update formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to update to (e.g. v1.3.3)"
        required: true

permissions:
  contents: write

jobs:
  update:
    name: Bump formula
    runs-on: ubuntu-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Debug — confirm checkout
        run: |
          echo "workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/Formula" || echo "Formula dir missing!"

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Download tarball and compute sha256
        id: sha
        run: |
          URL="https://github.com/link-coder100788/WhatDidIDo/archive/refs/tags/${{ steps.ver.outputs.tag }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          FORMULA="$GITHUB_WORKSPACE/Formula/whatdidido.rb"
          sed -i \
            -e 's|url "https://github.com/link-coder100788/WhatDidIDo/archive/refs/tags/.*"|url "${{ steps.sha.outputs.url }}"|' \
            -e 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' \
            "$FORMULA"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whatdidido.rb
          git commit -m "whatdidido ${{ steps.ver.outputs.version }}"
          git push
